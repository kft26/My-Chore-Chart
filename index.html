.badge-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}@media(max-width:600px){.badge-grid{grid-template-columns:repeat(3,1fr)}}.badge-card{padding:10px 6px;border-radius:9px;text-align:center;border:1px solid var(--border);background:var(--card)}.badge-card.unlocked{border-color:var(--teal);background:${t ? "rgba(45,212,191,.04)" : "rgba(45,212,191,.06)"};animation:badgePop .4s ease-out}.badge-card.locked{opacity:.35;filter:grayscale(1)}

.p-main{flex:1;padding:18px 22px;overflow-y:auto;max-height:100vh}@media(max-width:900px){.p-main{padding:10px}}.p-title{font-size:16px;font-weight:800;margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--border)}.p-subtitle{font-size:13px;font-weight:700;margin-bottom:6px}.p-card{background:var(--card);border:1px solid var(--border);border-radius:9px;padding:12px}.p-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:10px}.p-stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:3px}.p-stat{padding:5px;background:${t ? "rgba(0,0,0,.1)" : "rgba(0,0,0,.02)"};border-radius:5px;text-align:center}.p-stat-l{font-size:7px;color:var(--dim);text-transform:uppercase;letter-spacing:.5px;font-weight:700}.p-stat-v{font-size:13px;font-weight:700;margin-top:1px}
.p-inp{padding:8px 10px;background:${t ? "rgba(0,0,0,.2)" : "rgba(0,0,0,.03)"};border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:'Sora';font-size:12px;font-weight:500;outline:none;margin-bottom:4px;transition:border-color .15s}.p-inp:focus{border-color:var(--teal)}.p-inp::placeholder{color:var(--dim)}.p-btn{padding:6px 12px;border-radius:6px;font-family:'Sora';font-weight:600;font-size:11px;border:1px solid transparent;cursor:pointer;transition:all .12s;white-space:nowrap}.p-btn:hover{transform:translateY(-1px)}.p-btn-g{background:${t ? "rgba(52,211,153,.06)" : "rgba(52,211,153,.1)"};border-color:${t ? "rgba(52,211,153,.1)" : "rgba(52,211,153,.15)"};color:var(--green)}.p-btn-sm{padding:4px 8px;font-size:10px;background:transparent;border-color:var(--border);color:var(--muted);border-radius:5px}.p-btn-sm:hover{border-color:var(--teal);color:var(--teal)}
.p-emoji-btn{width:32px;height:32px;border-radius:6px;border:1px solid var(--border);background:${t ? "rgba(0,0,0,.2)" : "rgba(0,0,0,.03)"};font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;position:relative}.p-emoji-btn:hover{border-color:var(--teal)}.p-emoji-grid{position:absolute;bottom:36px;left:0;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:4px;display:grid;grid-template-columns:repeat(5,1fr);gap:2px;z-index:10;box-shadow:0 8px 25px rgba(0,0,0,.4)}.p-eo{width:24px;height:24px;border:none;background:transparent;border-radius:4px;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center}.p-eo:hover{background:var(--hover);transform:scale(1.1)}
